<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Manager Pro</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #00ffa3;
            --text-primary: #ffffff;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --hover-bg: #21262d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 1000px; }

        /* HEADER & TABS */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .tab-link { 
            background: transparent; border: none; color: var(--text-secondary); 
            padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .tab-link.active { background: var(--accent-color); color: #0d1117; }

        /* FORMULARIO DE OPERACIÓN */
        .op-form { 
            background: var(--card-bg); padding: 20px; border-radius: 12px; 
            border: 1px solid var(--border-color); margin-bottom: 25px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;
        }
        .op-form input, .op-form select {
            background: #0d1117; border: 1px solid var(--border-color);
            color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box;
        }

        /* BROKER GRID */
        .broker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .broker-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .broker-card:hover { border-color: var(--accent-color); transform: translateY(-3px); }
        .broker-card h4 { margin: 0; color: var(--accent-color); }
        .broker-card span { font-size: 0.8rem; color: var(--text-secondary); }

        /* VISTA DETALLE BROKER */
        #broker-detail-view { display: none; }
        .back-btn { background: none; border: 1px solid var(--text-secondary); color: var(--text-secondary); padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }

        /* TABLAS */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--text-secondary); padding: 12px; border-bottom: 2px solid var(--border-color); font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); }

        .btn-save { background: var(--accent-color); color: #000; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-size: 1.5rem; font-weight: bold;"><span>⬡</span> Portfolio Tracker</div>
    </div>

    <div class="nav-tabs">
        <button class="tab-link active" onclick="showSection('portfolio')">Portfolio Total</button>
        <button class="tab-link" onclick="showSection('brokers')">Mis Brokers</button>
        <button class="tab-link" onclick="showSection('nueva-op')">+ Nueva Operación</button>
    </div>

    <div id="nueva-op" class="content-section" style="display:none">
        <h3>Cargar Operación</h3>
        <div class="op-form">
            <input type="text" id="in-ticker" placeholder="Activo (ej: BIOX)">
            <input type="number" id="in-price" placeholder="Precio Compra">
            <input type="number" id="in-qty" placeholder="Cantidad">
            <input type="number" id="in-comm" placeholder="Comisión (USD)">
            <select id="in-broker">
                <option value="">Seleccionar Broker</option>
                <option value="Bull Market">Bull Market</option>
                <option value="IOL">IOL</option>
                <option value="IOL Dólares">IOL Dólares</option>
                <option value="Santander">Santander</option>
                <option value="Galicia">Galicia</option>
                <option value="Binance">Binance</option>
                <option value="Gate.io">Gate.io</option>
                <option value="Kucoin">Kucoin</option>
            </select>
            <button class="btn-save" onclick="saveOp()">Guardar</button>
        </div>
    </div>

    <div id="portfolio" class="content-section">
        <h3>Resumen General de Activos</h3>
        <table>
            <thead>
                <tr>
                    <th>Activo</th>
                    <th>Cant. Total</th>
                    <th>PPC Promedio</th>
                    <th>Inversión + Comis.</th>
                </tr>
            </thead>
            <tbody id="main-table-body"></tbody>
        </table>
    </div>

    <div id="brokers" class="content-section" style="display:none">
        <div id="broker-grid-view">
            <h3>Seleccioná un Broker para ver operaciones</h3>
            <div class="broker-grid" id="broker-grid-container">
                </div>
            <div style="margin-top: 30px; border-top: 1px dashed var(--border-color); padding-top: 20px;">
                <h4>Agregar Broker Personalizado</h4>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-broker-name" placeholder="Nombre del Broker" style="background:#161b22; border:1px solid var(--border-color); color:white; padding:10px; border-radius:6px; flex:1">
                    <button class="btn-save" onclick="addCustomBroker()" style="padding: 0 20px;">Añadir</button>
                </div>
            </div>
        </div>

        <div id="broker-detail-view">
            <button class="back-btn" onclick="hideBrokerDetail()">← Volver a Brokers</button>
            <h3 id="detail-title">Operaciones en [Broker]</h3>
            <table>
                <thead>
                    <tr>
                        <th>Activo</th>
                        <th>Precio</th>
                        <th>Cant.</th>
                        <th>Comisión</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="detail-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let ops = JSON.parse(localStorage.getItem('operations')) || [];
    let customBrokers = JSON.parse(localStorage.getItem('customList')) || ["Bull Market", "IOL", "IOL Dólares", "Santander", "Galicia", "Binance", "Gate.io", "Kucoin"];

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.currentTarget.classList.add('active');
        if(id === 'portfolio') renderMainPortfolio();
        if(id === 'brokers') renderBrokerGrid();
    }

    function saveOp() {
        const op = {
            ticker: document.getElementById('in-ticker').value.toUpperCase(),
            price: parseFloat(document.getElementById('in-price').value),
            qty: parseFloat(document.getElementById('in-qty').value),
            comm: parseFloat(document.getElementById('in-comm').value) || 0,
            broker: document.getElementById('in-broker').value
        };

        if(!op.ticker || !op.price || !op.broker) return alert("Faltan datos");

        ops.push(op);
        localStorage.setItem('operations', JSON.stringify(ops));
        alert("Operación guardada");
        showSection('portfolio');
    }

    function renderMainPortfolio() {
        const body = document.getElementById('main-table-body');
        body.innerHTML = '';
        const summary = {};

        ops.forEach(o => {
            if(!summary[o.ticker]) summary[o.ticker] = { qty: 0, cost: 0 };
            summary[o.ticker].qty += o.qty;
            summary[o.ticker].cost += (o.price * o.qty) + o.comm;
        });

        for(let t in summary) {
            body.innerHTML += `<tr>
                <td><b>${t}</b></td>
                <td>${summary[t].qty}</td>
                <td>$${(summary[t].cost / summary[t].qty).toFixed(2)}</td>
                <td>$${summary[t].cost.toLocaleString()}</td>
            </tr>`;
        }
    }

    function renderBrokerGrid() {
        const container = document.getElementById('broker-grid-container');
        const select = document.getElementById('in-broker');
        container.innerHTML = '';
        select.innerHTML = '<option value="">Seleccionar Broker</option>';

        customBrokers.forEach(b => {
            const count = ops.filter(o => o.broker === b).length;
            container.innerHTML += `
                <div class="broker-card" onclick="viewBrokerDetail('${b}')">
                    <h4>${b}</h4>
                    <span>${count} operaciones</span>
                </div>`;
            select.innerHTML += `<option value="${b}">${b}</option>`;
        });
    }

    function viewBrokerDetail(name) {
        document.getElementById('broker-grid-view').style.display = 'none';
        document.getElementById('broker-detail-view').style.display = 'block';
        document.getElementById('detail-title').innerText = `Operaciones en ${name}`;
        
        const body = document.getElementById('detail-table-body');
        body.innerHTML = '';
        const filtered = ops.filter(o => o.broker === name);

        filtered.forEach(o => {
            const total = (o.price * o.qty) + o.comm;
            body.innerHTML += `<tr>
                <td><b>${o.ticker}</b></td>
                <td>$${o.price}</td>
                <td>${o.qty}</td>
                <td>$${o.comm}</td>
                <td>$${total.toFixed(2)}</td>
            </tr>`;
        });
    }

    function hideBrokerDetail() {
        document.getElementById('broker-grid-view').style.display = 'block';
        document.getElementById('broker-detail-view').style.display = 'none';
    }

    function addCustomBroker() {
        const name = document.getElementById('new-broker-name').value;
        if(name && !customBrokers.includes(name)) {
            customBrokers.push(name);
            localStorage.setItem('customList', JSON.stringify(customBrokers));
            renderBrokerGrid();
            document.getElementById('new-broker-name').value = '';
        }
    }

    // Inicio
    renderMainPortfolio();
</script>

</body>
</html>
