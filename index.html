<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Financiero</title>
    <style>
        /* 1. RESTAURACIÓN DE COLORES MINT ORIGINALES */
        :root {
            --bg-color: #0d1117;           /* Fondo oscuro profundo de la foto 1 */
            --card-bg: #161b22;            /* Fondo de tarjetas */
            --accent-color: #00ffa3;       /* Verde Mint exacto */
            --text-primary: #ffffff;
            --text-secondary: #8b949e;
            --border-color: #30363d;       /* Bordes sutiles */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px; /* Centrado para que se vea bien en desktop */
        }

        /* 2. HEADER - Estilo Foto 1 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand { font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent-color); }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-secondary { background: #21262d; color: white; border: 1px solid var(--border-color); }
        .btn-mint { background: var(--accent-color); color: #0d1117; }

        /* 3. GRID DE TARJETAS (Composición recuperada) */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .summary-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .summary-card label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-card h3 { margin: 8px 0 0; font-size: 1.5rem; }
        .summary-card p { margin: 4px 0 0; font-size: 0.85rem; }

        /* 4. TABS - Estilo Foto 1 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #21262d;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: #0d1117;
            font-weight: bold;
        }

        /* 5. ÁREA CENTRAL (Sin sidebar molesto) */
        .main-display {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .empty-state { text-align: center; color: var(--text-secondary); }
        .empty-icon { font-size: 3rem; margin-bottom: 10px; }

        /* Botón de Agregar flotante o integrado */
        .add-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand"><span>⬡</span> Portfolio</div>
        <div class="btn-group">
            <button class="btn btn-secondary">USD</button>
            <button class="btn btn-mint">Actualizar</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="summary-card">
            <label>Valor Total</label>
            <h3>$0,00</h3>
            <p style="color: var(--text-secondary)">≈ $0 ARS</p>
        </div>
        <div class="summary-card">
            <label>P&L Total</label>
            <h3 style="color: var(--accent-color)">$0,00</h3>
            <p style="color: var(--accent-color)">+0,00%</p>
        </div>
        <div class="summary-card">
            <label>Costo Base</label>
            <h3>$0,00</h3>
        </div>
        <div class="summary-card">
            <label>USD/ARS Blue</label>
            <h3 style="color: #f1c40f">$1.000</h3>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active">Portfolio</button>
        <button class="tab-btn">Órdenes</button>
        <button class="tab-btn">Gráficas</button>
        <button class="tab-btn" style="border: 1px dashed var(--accent-color);">Brokers 🏦</button>
    </div>

    <div class="main-display">
        <button class="add-btn">+ Agregar</button>
        <div class="empty-state">
            <div class="empty-icon">📮</div>
            <p>Cargá una operación para empezar.</p>
        </div>
    </div>
</div>

</body>
</html>
