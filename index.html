<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portfolio - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#fff;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
:root{--a:#00ffa3;--r:#ff4d6d;--g:#f0a500;--c:#161b22;--s:#0d1117;--b:#30363d;--m:#8b949e}

/* HEADER */
.hdr{background:#161b22;border-bottom:1px solid var(--b);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-size:18px;font-weight:800;color:var(--a)}
.hdr-sub{font-size:11px;color:var(--m);margin-top:2px}
.hdr-btns{display:flex;gap:8px;flex-shrink:0}
.btn-cur{padding:6px 12px;border-radius:8px;border:1px solid var(--b);background:#21262d;color:#fff;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit}
.btn-ref{padding:6px 12px;border-radius:8px;border:1px solid #00ffa344;background:#00ffa322;color:var(--a);cursor:pointer;font-weight:700;font-size:13px;font-family:inherit}

/* SUMMARY */
.sum{padding:14px 16px 0;display:flex;gap:8px;flex-wrap:wrap}
.sc{background:var(--c);border:1px solid var(--b);border-radius:11px;padding:12px 14px;flex:1;min-width:140px}
.sc-l{font-size:10px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.sc-v{font-size:17px;font-weight:700;font-family:monospace}
.sc-s{font-size:11px;color:var(--m);margin-top:2px}

/* TABS */
.tabs-wrap{padding:12px 16px 0}
.tabs{display:flex;gap:3px;background:#161b22;padding:4px;border-radius:10px;border:1px solid var(--b);overflow-x:auto}
.tab{padding:8px 12px;border:none;border-radius:7px;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;background:transparent;color:var(--m);white-space:nowrap}
.tab.active{background:var(--a);color:#000}

.content{padding:13px 16px 60px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:12px;color:var(--m);font-weight:600;letter-spacing:1px}
.btn-add{padding:7px 14px;border-radius:8px;border:none;background:var(--a);color:#000;cursor:pointer;font-weight:700;font-size:13px}

/* ASSET CARDS */
.ac-card{background:var(--c);border:1px solid var(--b);border-radius:13px;padding:14px;margin-bottom:10px}
.ac-top{display:flex;justify-content:space-between;align-items:flex-start}
.ac-left{display:flex;align-items:center;gap:9px}
.logo{width:32px;height:32px;border-radius:7px;object-fit:contain;background:#ffffff22}
.tkr{font-size:15px;font-weight:800}
.bdg{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#8b949e22;color:var(--m);margin-left:5px}
.ac-val{font-size:16px;font-weight:700;text-align:right}
.ac-pnl{font-size:12px;font-weight:600;text-align:right}

/* BROKER GRID */
.broker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.broker-card{background:var(--c);border:1px solid var(--b);padding:18px;border-radius:12px;text-align:center;cursor:pointer}
.broker-card h4{color:var(--a);font-size:14px;margin-bottom:4px}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:#000000cc;z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#161b22;border:1px solid var(--b);border-radius:20px 20px 0 0;padding:20px 18px 34px;width:100%;max-width:500px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:var(--m);margin-bottom:5px}
.fld input,.fld select{width:100%;background:#0d1117;border:1px solid var(--b);border-radius:8px;padding:12px;color:#fff}
.btn-ok{background:var(--a);color:#000;border:none;border-radius:8px;padding:13px;cursor:pointer;font-weight:700;width:100%}

.green{color:var(--a)}.red{color:var(--r)}.gold{color:var(--g)}.hidden{display:none!important}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">⬡ Portfolio</div>
    <div class="hdr-sub" id="status">Presione Actualizar para sincronizar</div>
  </div>
  <div class="hdr-btns">
    <button class="btn-cur" onclick="toggleCur()" id="btnCur">USD</button>
    <button class="btn-ref" onclick="refresh()" id="btnRef">Actualizar</button>
  </div>
</div>

<div class="sum">
  <div class="sc"><div class="sc-l">Valor Total</div><div class="sc-v" id="totVal">$0,00</div><div class="sc-s" id="totSub">—</div></div>
  <div class="sc"><div class="sc-l">P&L Total</div><div class="sc-v" id="totPnl">$0,00</div><div class="sc-s" id="totPct">—</div></div>
  <div class="sc"><div class="sc-l">Costo Base</div><div class="sc-v" id="totCost">$0,00</div></div>
  <div class="sc"><div class="sc-l">USD/ARS Blue</div><div class="sc-v gold" id="usdArs">$1.000</div></div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="showTab('portfolio',this)">Portfolio</button>
    <button class="tab" onclick="showTab('orders',this)">Órdenes</button>
    <button class="tab" onclick="showTab('brokers',this)">Brokers</button>
    <button class="tab" onclick="showTab('charts',this)">Gráficas</button>
  </div>
</div>

<div class="content" id="tab-portfolio">
  <div class="sec-hdr"><span class="sec-title">MIS ACTIVOS</span><button class="btn-add" onclick="openModal('order')">+ Agregar</button></div>
  <div id="assetList"></div>
</div>

<div class="content hidden" id="tab-orders">
  <div class="sec-hdr"><span class="sec-title">HISTORIAL</span></div>
  <div id="orderList"></div>
</div>

<div class="content hidden" id="tab-brokers">
  <div id="broker-grid-view">
    <div class="sec-hdr"><span class="sec-title">MIS BROKERS</span></div>
    <div class="broker-grid" id="brokerGrid"></div>
  </div>
</div>

<div class="content hidden" id="tab-charts">
    <div class="chart-box" style="height: 400px; margin-bottom: 20px; background: #131722; border-radius: 12px; overflow: hidden;">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_dashboard" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.MediumWidget({
              "symbols": [["Bitcoin","BINANCE:BTCUSDT|12m"],["MicroStrategy","NASDAQ:MSTR|12m"],["Bioceres","AMEX:BIOX|12m"],["AL30","BCBA:AL30|12m"]],
              "chartOnly": false, "width": "100%", "height": "100%", "locale": "es", "colorTheme": "dark", "gridLineColor": "rgba(42, 46, 57, 0)", "isTransparent": true, "autosize": true, "container_id": "tradingview_dashboard"
            });
            </script>
        </div>
    </div>
    
    <div style="display:flex; gap:14px; flex-wrap:wrap">
        <div class="sc" style="flex:1"><canvas id="pieChart" width="150" height="150"></canvas></div>
        <div id="pieLabels" style="flex:2"></div>
    </div>
</div>

<div class="modal-bg" id="modal-order">
  <div class="modal">
    <div class="fld"><label>Ticker</label><input id="o-ticker" placeholder="MSTR"></div>
    <div class="fld"><label>Tipo</label>
      <select id="o-type"><option>Acción USA</option><option>Cripto</option><option>Acción Argentina</option></select>
    </div>
    <div class="fld"><label>Cantidad</label><input id="o-qty" type="number"></div>
    <div class="fld"><label>Precio USD</label><input id="o-price" type="number"></div>
    <div class="fld"><label>Broker</label><select id="o-broker"></select></div>
    <button class="btn-ok" onclick="addOrder()">Registrar Operación</button>
    <button class="btn-ok" style="background:none; color:var(--m)" onclick="closeModal('order')">Cerrar</button>
  </div>
</div>

<script>
const AV_KEY = '8X9MWKFC0MU3LNSY';
let orders = JSON.parse(localStorage.getItem('pf5_or')||'[]');
let brokers = JSON.parse(localStorage.getItem('pf5_br')||'["IOL","Binance","Bull Market","Santander","Galicia"]');
let prices = {};
let currency = 'USD';
let pieChart = null;

function persist(){ localStorage.setItem('pf5_or', JSON.stringify(orders)); }

function fmt(n,d=2){ return new Intl.NumberFormat('es-AR',{minimumFractionDigits:d}).format(n); }
const ars = () => prices['USD_ARS'] || 1000;

function getPortfolio(){
  const map={};
  orders.forEach(o=>{
    if(!map[o.ticker]) map[o.ticker]={ticker:o.ticker,type:o.type,qty:0,cost:0};
    map[o.ticker].qty += parseFloat(o.qty);
    map[o.ticker].cost += (o.qty * o.price);
  });
  return Object.values(map).filter(a=>a.qty>0);
}

async function refresh(){
  const pf = getPortfolio();
  document.getElementById('btnRef').textContent = '...';
  try {
    // Precio Blue
    const rD = await fetch('https://dolarapi.com/v1/dolares/blue');
    const dD = await rD.json();
    prices['USD_ARS'] = dD.venta;

    // Precios Activos (Simulado para rapidez, usa AV_KEY para reales)
    for(const a of pf) {
        prices[a.ticker] = a.ticker === 'BTC' ? 64000 : a.ticker === 'MSTR' ? 1600 : a.ticker === 'BIOX' ? 13 : 0.5;
    }
  } catch(e) { console.error(e); }
  
  document.getElementById('btnRef').textContent = 'Actualizar';
  render();
}

function render(){
  const pf = getPortfolio();
  let totUSD = 0, totCost = 0;
  
  const al = document.getElementById('assetList');
  al.innerHTML = '';
  
  pf.forEach(a => {
    const price = prices[a.ticker] || a.cost/a.qty;
    const val = a.qty * price;
    totUSD += val; totCost += a.cost;
    
    al.innerHTML += `
      <div class="ac-card">
        <div class="ac-top">
          <div class="ac-left"><div style="background:var(--a); width:8px; height:8px; border-radius:50%"></div><strong>${a.ticker}</strong> <span class="bdg">${a.type}</span></div>
          <div class="ac-val">${currency==='USD'?'$'+fmt(val):'$'+fmt(val*ars(),0)}</div>
        </div>
        <div class="ac-pnl ${val>=a.cost?'green':'red'}">${val>=a.cost?'+':''}${fmt(((val-a.cost)/a.cost)*100)}%</div>
      </div>`;
  });

  document.getElementById('totVal').textContent = currency==='USD'?'$'+fmt(totUSD):'$'+fmt(totUSD*ars(),0);
  document.getElementById('totCost').textContent = currency==='USD'?'$'+fmt(totCost):'$'+fmt(totCost*ars(),0);
  document.getElementById('totPnl').textContent = currency==='USD'?'$'+fmt(totUSD-totCost):'$'+fmt((totUSD-totCost)*ars(),0);
  document.getElementById('totPnl').className = 'sc-v ' + (totUSD>=totCost?'green':'red');
  document.getElementById('totPct').textContent = fmt(((totUSD-totCost)/totCost)*100) + '%';
  document.getElementById('usdArs').textContent = '$' + fmt(ars(),0);
  
  renderBrokers();
}

function renderBrokers(){
  const grid = document.getElementById('brokerGrid');
  grid.innerHTML = '';
  brokers.forEach(b => {
    const count = orders.filter(o => o.broker === b).length;
    grid.innerHTML += `<div class="broker-card"><h4>${b}</h4><span>${count} órdenes</span></div>`;
  });
  const sel = document.getElementById('o-broker');
  sel.innerHTML = brokers.map(b=>`<option>${b}</option>`).join('');
}

function addOrder(){
  const o = {
    id: Date.now(),
    ticker: document.getElementById('o-ticker').value.toUpperCase(),
    qty: document.getElementById('o-qty').value,
    price: document.getElementById('o-price').value,
    type: document.getElementById('o-type').value,
    broker: document.getElementById('o-broker').value
  };
  orders.push(o); persist(); closeModal('order'); render();
}

function showTab(name,btn){
  document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function openModal(id){ document.getElementById('modal-'+id).classList.add('open'); }
function closeModal(id){ document.getElementById('modal-'+id).classList.remove('open'); }
function toggleCur(){ currency = currency==='USD'?'ARS':'USD'; document.getElementById('btnCur').textContent=currency; render(); }

render();
</script>
</body>
</html>
