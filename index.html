<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Financiero</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #00ffa3;
            --text-primary: #ffffff;
            --text-secondary: #8b949e;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 1000px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .brand { font-weight: bold; font-size: 1.2rem; }
        .brand span { color: var(--accent-color); }

        /* Resumen */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .summary-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .summary-card label { color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; }
        .summary-card h3 { margin: 8px 0 0; font-size: 1.5rem; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #21262d; border: none; color: var(--text-secondary); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-color); color: #0d1117; font-weight: bold; }
        .tab-btn:hover { background: #30363d; }

        /* Área Principal */
        .main-content { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; min-height: 300px; padding: 40px; position: relative; }
        .tab-content { display: none; text-align: center; }
        .tab-content.active { display: block; }

        /* Botón Actualizar Animación */
        .loading { opacity: 0.5; pointer-events: none; }

        /* Ventana de Brokers */
        #brokers-panel {
            background: #0d1117; border: 1px solid var(--accent-color); border-radius: 8px;
            padding: 15px; margin-top: 15px; display: none;
        }
        .broker-link { color: var(--accent-color); text-decoration: none; display: block; margin: 5px 0; }
        
        .btn-mint { background: var(--accent-color); color: #0d1117; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand"><span>⬡</span> Portfolio</div>
        <button class="btn-mint" id="btn-actualizar">Actualizar Precios</button>
    </div>

    <div class="summary-grid">
        <div class="summary-card"><label>Valor Total</label><h3 id="val-total">$0,00</h3></div>
        <div class="summary-card"><label>P&L Total</label><h3 id="val-pl" style="color: var(--accent-color)">$0,00</h3></div>
        <div class="summary-card"><label>Dólar MEP</label><h3 style="color: #f1c40f">$1.150</h3></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('portfolio')">Portfolio</button>
        <button class="tab-btn" onclick="showTab('ordenes')">Órdenes</button>
        <button class="tab-btn" onclick="toggleBrokers()">Brokers 🏦</button>
    </div>

    <div id="brokers-panel">
        <p style="margin-top:0">Accesos directos:</p>
        <a href="https://www.invertironline.com/" target="_blank" class="broker-link">→ Invertir Online</a>
        <a href="https://www.balanz.com/" target="_blank" class="broker-link">→ Balanz</a>
        <a href="https://www.binance.com/" target="_blank" class="broker-link">→ Binance</a>
    </div>

    <div class="main-content">
        <div id="portfolio" class="tab-content active">
            <div style="font-size: 3rem">📮</div>
            <p>No hay activos cargados todavía.</p>
            <button class="btn-mint" onclick="alert('Funcionalidad para agregar activos en desarrollo')">+ Agregar Activo</button>
        </div>
        
        <div id="ordenes" class="tab-content">
            <h3>Historial de Órdenes</h3>
            <p style="color: var(--text-secondary)">Aquí aparecerán tus compras y ventas.</p>
        </div>
    </div>
</div>

<script>
    // 1. Lógica de Pestañas
    function showTab(tabId) {
        // Ocultar todos los contenidos
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        // Quitar clase active de los botones
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        
        // Mostrar la elegida
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // 2. Mostrar/Ocultar Panel de Brokers
    function toggleBrokers() {
        const panel = document.getElementById('brokers-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    // 3. Simulación de Actualización de Precios
    document.getElementById('btn-actualizar').addEventListener('click', function() {
        const btn = this;
        btn.innerText = "Actualizando...";
        btn.classList.add('loading');

        // Simulamos una demora de red (como si buscara en una API)
        setTimeout(() => {
            btn.innerText = "Actualizar Precios";
            btn.classList.remove('loading');
            
            // Simulamos cambio de valores (aquí iría la lógica de fetching real)
            document.getElementById('val-total').innerText = "$1.250,50";
            document.getElementById('val-pl').innerText = "+$45,20";
            
            alert("Precios actualizados (Simulado)");
        }, 1500);
    });
</script>

</body>
</html>
