<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Manager Pro</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --mint: #00ffa3; --text: #ffffff;
            --sec: #8b949e; --border: #30363d;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Dashboard Header */
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .card label { color: var(--sec); font-size: 0.7rem; text-transform: uppercase; }
        .card h3 { margin: 10px 0 0; font-size: 1.5rem; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; color: var(--sec); padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; }
        .tab-btn.active { background: var(--mint); color: #000; }

        /* Sections */
        .section { display: none; }
        .section.active { display: block; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th { text-align: left; padding: 15px; color: var(--sec); border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }

        /* Forms */
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: var(--card); padding: 20px; border-radius: 10px; }
        input, select { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 5px; }
        .btn-add { background: var(--mint); color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        
        /* Brokers Grid */
        .broker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .broker-item { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="summary">
        <div class="card"><label>Valor Total</label><h3 id="total-val">$0.00</h3></div>
        <div class="card"><label>Dólar MEP</label><input type="number" id="mep-input" value="1145" onchange="renderAll()" style="width: 100px; font-size: 1.2rem; background: transparent; border: none; color: #f1c40f; font-weight: bold;"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tab-portfolio')">Portfolio</button>
        <button class="tab-btn" onclick="showTab('tab-graficas')">Gráficas</button>
        <button class="tab-btn" onclick="showTab('tab-brokers')">Brokers</button>
        <button class="tab-btn" onclick="showTab('tab-nueva')">+ Operación</button>
    </div>

    <div id="tab-portfolio" class="section active">
        <table>
            <thead><tr><th>Activo</th><th>Cant.</th><th>PPC</th><th>Broker</th><th>Total USD</th></tr></thead>
            <tbody id="portfolio-body"></tbody>
        </table>
    </div>

    <div id="tab-graficas" class="section">
        <div style="height: 450px; background: #000; border-radius: 10px; overflow: hidden;">
            <iframe id="tv-frame" src="https://s.tradingview.com/embed-widget/symbol-overview/?fontColor=white&symbols=AMEX:BIOX,NASDAQ:MSTR,BITSTAMP:BTCUSD,BCBA:AL30&gridLineColor=rgba(42,46,57,0)&backgroundColor=rgba(22,27,34,1)" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <div id="tab-brokers" class="section">
        <div class="broker-grid" id="broker-display"></div>
    </div>

    <div id="tab-nueva" class="section">
        <div class="form-row">
            <input type="text" id="f-ticker" placeholder="Ticker (BIOX, AL30)">
            <input type="number" id="f-qty" placeholder="Cantidad">
            <input type="number" id="f-price" placeholder="Precio USD">
            <select id="f-broker">
                <option>Bull Market</option><option>IOL</option><option>Binance</option>
                <option>Santander</option><option>Galicia</option>
            </select>
            <button class="btn-add" onclick="saveOp()">Guardar</button>
        </div>
    </div>
</div>

        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => { if(btn.getAttribute('onclick').includes(id)) btn.classList.add('active'); });
    }
