<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #00ffa3;
            --text-primary: #ffffff;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --hover-bg: #21262d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 900px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .brand { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); }
        .brand span { color: var(--accent-color); margin-right: 5px; }

        /* RESUMEN SUPERIOR */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .summary-card { background: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); }
        .summary-card label { color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .summary-card h3 { margin: 8px 0 0; font-size: 1.4rem; font-weight: 600; }

        /* TABS (Morfología Claude) */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .tab-link { 
            background: transparent; border: none; color: var(--text-secondary); 
            padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 500;
            transition: all 0.2s ease;
        }
        .tab-link:hover { background: var(--hover-bg); color: var(--text-primary); }
        .tab-link.active { background: var(--accent-color); color: #0d1117; font-weight: 700; }

        /* CONTENIDO */
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* BROKERS DISPLAY */
        .broker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
        .broker-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            padding: 15px; border-radius: 10px; text-align: center; 
            text-decoration: none; color: var(--text-primary); font-weight: 500;
            transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .broker-btn:hover { border-color: var(--accent-color); background: var(--hover-bg); transform: translateY(-2px); }
        .broker-btn i { font-size: 1.2rem; color: var(--accent-color); }

        /* FORMULARIOS */
        .manual-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px dashed var(--border-color); margin-top: 30px; }
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        input { 
            flex: 1; background: #0d1117; border: 1px solid var(--border-color); 
            color: white; padding: 10px; border-radius: 6px; 
        }
        .btn-add { background: var(--accent-color); color: #0d1117; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* TABLA PORTFOLIO */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--text-secondary); font-size: 0.8rem; padding: 12px; border-bottom: 2px solid var(--border-color); }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand"><span>⬡</span> MyAssets</div>
        <div id="mep-display" style="color: #f1c40f; font-size: 0.9rem; font-weight: bold;">MEP: $1.140</div>
    </div>

    <div class="summary-grid">
        <div class="summary-card"><label>Total USD</label><h3 id="main-total">$0.00</h3></div>
        <div class="summary-card"><label>Day Change</label><h3 style="color: var(--accent-color)">+0.00%</h3></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-link active" onclick="openTab(event, 'tab-portfolio')">Portfolio</button>
        <button class="tab-link" onclick="openTab(event, 'tab-graficos')">Gráficos</button>
        <button class="tab-link" onclick="openTab(event, 'tab-brokers')">Brokers 🏦</button>
    </div>

    <div id="tab-portfolio" class="content-section active">
        <table>
            <thead>
                <tr>
                    <th>Activo</th>
                    <th>Cantidad</th>
                    <th>PPC</th>
                    <th>Total USD</th>
                </tr>
            </thead>
            <tbody id="portfolio-body">
                <tr><td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 40px;">No hay activos cargados.</td></tr>
            </tbody>
        </table>
    </div>

    <div id="tab-graficos" class="content-section">
        <div style="height: 400px; background: #161b22; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
            [ Área de Visualización TradingView ]
        </div>
    </div>

    <div id="tab-brokers" class="content-section">
        <div class="broker-grid">
            <a href="https://www.bullmarketbrokers.com/" target="_blank" class="broker-btn"><span>📈</span> Bull Market</a>
            <a href="https://www.invertironline.com/" target="_blank" class="broker-btn"><span>📊</span> IOL</a>
            <a href="https://www.invertironline.com/" target="_blank" class="broker-btn"><span>💵</span> IOL Dólares</a>
            <a href="https://www.santander.com.ar/" target="_blank" class="broker-btn"><span>🏛️</span> Santander</a>
            <a href="https://www.galicia.ar/" target="_blank" class="broker-btn"><span>🏦</span> Galicia</a>
            <a href="https://www.binance.com/" target="_blank" class="broker-btn"><span>₿</span> Binance</a>
            <a href="https://www.gate.io/" target="_blank" class="broker-btn"><span>🌐</span> Gate.io</a>
            <a href="https://www.kucoin.com/" target="_blank" class="broker-btn"><span>💎</span> Kucoin</a>
            <div id="dynamic-brokers" style="display: contents;"></div>
        </div>

        <div class="manual-box">
            <h4 style="margin:0">Agregar Broker Manual</h4>
            <div class="input-group">
                <input type="text" id="manual-broker-name" placeholder="Nombre">
                <input type="text" id="manual-broker-url" placeholder="URL (https://...)">
                <button class="btn-add" onclick="addCustomBroker()">Agregar</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        var i, content, tablinks;
        content = document.getElementsByClassName("content-section");
        for (i = 0; i < content.length; i++) { content[i].classList.remove("active"); }
        tablinks = document.getElementsByClassName("tab-link");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Lógica para brokers manuales
    let customBrokers = JSON.parse(localStorage.getItem('customBrokers')) || [];

    function addCustomBroker() {
        const name = document.getElementById('manual-broker-name').value;
        const url = document.getElementById('manual-broker-url').value;
        
        if (name && url) {
            customBrokers.push({ name, url });
            localStorage.setItem('customBrokers', JSON.stringify(customBrokers));
            renderCustomBrokers();
            document.getElementById('manual-broker-name').value = '';
            document.getElementById('manual-broker-url').value = '';
        }
    }

    function renderCustomBrokers() {
        const container = document.getElementById('dynamic-brokers');
        container.innerHTML = '';
        customBrokers.forEach(b => {
            container.innerHTML += `<a href="${b.url}" target="_blank" class="broker-btn"><span>🔗</span> ${b.name}</a>`;
        });
    }

    // Inicializar
    renderCustomBrokers();
</script>

</body>
</html>
